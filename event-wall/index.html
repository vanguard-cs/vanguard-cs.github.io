<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no">
    <meta name="robots" content="noindex,nofollow">
    <title>Event Graffiti Wall</title>

    <!-- Google Fonts for UI and Graffiti -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fredericka+the+Great&family=Permanent+Marker&family=Rock+Salt&family=Sedgwick+Ave&family=Reenie+Beanie&family=Caveat+Brush&family=Shadows+Into+Light&display=swap"
        rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="wall.css">

    <!-- Supabase, html2canvas, UTIF, and Marked Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/utif@3.1.0/UTIF.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Main Logic -->
    <script type="module" src="wall.js"></script>
</head>

<body>

    <!-- Authentication Modal (Magic Link) -->
    <div id="auth-modal" class="modal active">
        <div class="modal-content">
            <h2>Guest Authentication</h2>
            <p>Enter your invited email address to receive a magic login link.</p>
            <form id="auth-form">
                <input type="email" id="auth-email" placeholder="guest@example.com" required>
                <button type="submit" id="btn-login">Send Magic Link</button>
            </form>
            <div id="auth-message" class="system-message"></div>
        </div>
    </div>

    <!-- Compose Message Modal -->
    <div id="compose-modal" class="modal">
        <div class="modal-content">
            <h2 id="compose-title">Leave Your Mark</h2>
            <textarea id="graffiti-input" placeholder="Spray your message..."></textarea>
            <div class="color-palette" id="color-palette">
                <!-- Swatches -->
                <div class="swatch active" data-color="#ffffff" style="background: #ffffff;"></div>
                <div class="swatch" data-color="#ff00ff" style="background: #ff00ff;"></div>
                <div class="swatch" data-color="#00e5ff" style="background: #00e5ff;"></div>
                <div class="swatch" data-color="#ffd500" style="background: #ffd500;"></div>
                <div class="swatch" data-color="#00ff88" style="background: #00ff88;"></div>
                <div class="swatch" data-color="#ff3300" style="background: #ff3300;"></div>
                <div class="swatch" data-color="#b800ff" style="background: #b800ff;"></div>
            </div>
            <div class="modal-actions">
                <button id="btn-cancel-message" class="btn-secondary">Cancel</button>
                <button id="btn-save-message">Spray</button>
            </div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content details-content">
            <h2>Event Information</h2>
            <div id="markdown-container" class="markdown-body">
                <!-- Markdown content injected here -->
                <p>Loading event details...</p>
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="btn-back-details" class="btn-secondary">Back</button>
                <button id="btn-close-details" class="btn-primary">Close</button>
            </div>
        </div>
    </div>

    <!-- Main Application Layout -->
    <div id="app-wrapper" style="display: none;">
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

        <!-- Mobile Specific UI -->
        <header id="mobile-header">
            <h1 style="color: var(--accent); margin: 0; font-size: 1.2rem;">Event Wall</h1>
            <button id="btn-mobile-menu" class="btn-text">Menu</button>
        </header>

        <button id="fab-leave-message" title="Leave a Message">+</button>

        <!-- The Graffiti Wall (Scrollable if expands) -->
        <main id="wall-container">
            <div id="wall-surface">
                <!-- Graffiti messages get injected here -->
            </div>
        </main>

        <!-- Fixed Right Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Event Details</h2>
                <p>Welcome to the private event wall. Leave your mark below!</p>
            </div>

            <div class="sidebar-actions">
                <button id="btn-go-to-wall" class="btn-secondary mobile-only" style="display: none; margin-bottom: 20px;">Go to Wall</button>
                <button id="btn-event-details" class="btn-primary" style="margin-bottom: 15px;">Event Details</button>
                <button id="btn-leave-message" class="btn-primary">Leave a Message</button>
                <button id="btn-edit-message" class="btn-secondary" style="display: none;">Edit My Message</button>
            </div>

            <div class="rsvp-section">
                <h3>Will you attend?</h3>
                <div class="rsvp-buttons">
                    <button id="btn-rsvp-yes" class="btn-yes">Yes</button>
                    <button id="btn-rsvp-no" class="btn-no">No</button>
                </div>
                <div id="rsvp-status"></div>
            </div>

            <!-- Admin Tools (Hidden by default) -->
            <div id="admin-section"
                style="display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #444;">
                <h3 style="color: var(--accent); margin-top: 0;">Admin Tools</h3>
                <button id="btn-toggle-design" class="btn-secondary" style="margin-bottom: 10px;">Enter Design
                    Mode</button>
                <button id="btn-export-tiff" class="btn-primary">Export Canvas (TIFF)</button>
            </div>

            <!-- Auth Status footer -->
            <div class="auth-status">
                <span id="current-user-email"></span>
                <button id="btn-logout" class="btn-text">Log Out</button>
            </div>
        </aside>
    </div>

</body>

</html>
